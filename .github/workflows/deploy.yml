name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -----------------------
      # 3. Build Backend Image
      # -----------------------
      - name: Build Backend Image
        run: |
          docker build \
            --no-cache \
            -t ${{ secrets.DOCKER_USERNAME }}/foodie-backend:latest ./backend

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/foodie-backend:latest

      # ------------------------
      # 4. Build Frontend Image
      # ------------------------
      - name: Build Frontend Image
        run: |
          docker build --no-cache \
            --build-arg VITE_BACKEND_BASE_URL=${{ secrets.VITE_BACKEND_BASE_URL }} \
            --build-arg VITE_BACKEND_REFRESH_URL=${{ secrets.VITE_BACKEND_REFRESH_URL }} \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }} \
            --build-arg VITE_STRIPE_PUBLISHABLE_KEY=${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }} \
            -t ${{ secrets.DOCKER_USERNAME }}/foodie-client:latest ./Client

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/foodie-client:latest